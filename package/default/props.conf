[openai:usage]
SHOULD_LINEMERGE = false
LINE_BREAKER     = ([\r\n]+)
TIME_PREFIX      = \"_time\"\s*:\s*
TIME_FORMAT      = %s
MAX_TIMESTAMP_LOOKAHEAD = 20
TRUNCATE         = 999999
KV_MODE          = json
CHARSET          = utf-8
category         = Custom
description      = OpenAI API usage metrics collected via TA-openai-usage
